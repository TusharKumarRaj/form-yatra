version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: formyatra_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-formyatra}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-formyatra}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: formyatra_migrate
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password123}@db:5432/${POSTGRES_DB:-formyatra}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: formyatra_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password123}@db:5432/${POSTGRES_DB:-formyatra}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwt}
      - PORT=8000
      - BASE_URL=https://api.formyatra.tusharcodes.tech
      - WEB_URL=https://formyatra.tusharcodes.tech
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - NEXT_PUBLIC_API_URL=https://api.formyatra.tusharcodes.tech/trpc
    container_name: formyatra_web
    restart: always
    environment:
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
